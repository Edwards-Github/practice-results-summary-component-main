<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="page-container">
    <div class="left-half">
      <div class="your-result">Your Result</div>
      <div class="score-container">
        <div class="overall-score">76</div>
        <div class="max-score">of 100</div>
      </div>
      <div class="result-status">Great</div>
      <div class="result-description">You scored higher than 65% of the people who have taken these tests.</div>
    </div>

    <div class="right-half">
      <h1 class="summary">Summary</h1>
      <div class="right-container">
        <div class="reaction-container reaction-red">
          <div class="sub-container">
            <img src="icon-reaction.svg" alt="lightning-bolt-reaction" class="reaction">
            <div class="category">Reaction</div>
          </div>
          <div class="score"> <span class="total-score">80</span> / 100</div>
        </div>

        <div class="reaction-container reaction-yellow">
          <div class="sub-container">
            <img src="icon-memory.svg" alt="brain-reaction">
            <div class="category">Memory</div>
          </div>
          <div class="score"><span class="total-score">92</span> / 100</div>
        </div>

        <div class="reaction-container reaction-green">
          <div class="sub-container">
            <img src="icon-verbal.svg" alt="speech-bubble-reaction">
            <div class="category">Verbal</div>
          </div>
          <div class="score"><span class="total-score">61</span> / 100</div>
        </div>

        <div class="reaction-container reaction-blue">
          <div class="sub-container">
          <img src="icon-visual.svg" alt="eye-reaction">
          <div class="category">Visual</div>
          </div>
          <div class="score"><span class="total-score">73</span> / 100</div>
        </div>
      </div>
      <button class="continue">Continue</button>
    </div>
  </div>
</body>
</html>
